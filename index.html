<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>Telego — Go Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }
        html, body {
            height: 100%;
            width: 100%;
            background: #0d0c0b;
            color: #e4dcd2;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
        }
        #root { width: 100%; height: 100%; display: flex; position: fixed; inset: 0; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2a2520; border-radius: 4px; }
        button, input { font-family: 'Outfit', sans-serif; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(12px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes drawerUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.21.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-wasm@4.21.0/dist/tf-backend-wasm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu@4.21.0/dist/tf-backend-webgpu.min.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import { GoBoard as GoBoard3DEngine } from './goBoard.js';
        import { attachOnlineBridge } from './online/OnlineBridge.js';
        import { GoGame } from './game/GoGame.js';
        import { KataGoEngine } from './ai/KataGoEngine.js';
        import { parseSgf } from './sgf/SgfParser.js';
        import { localPuzzleLibrary } from './puzzles/LocalPuzzleLibrary.js';

        window.GoBoard3DEngine = GoBoard3DEngine;
        window.__telebaAttachOnlineBridge = attachOnlineBridge;
        window.TelegoModules = { GoGame, KataGoEngine, parseSgf, localPuzzleLibrary };
        window.__telebaPuzzleLibrary = localPuzzleLibrary;
        window.dispatchEvent(new Event('teleba-modules-ready'));
        window.dispatchEvent(new Event('teleba-engine-ready'));
    </script>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
    <script type="text/babel" src="appgui/GoBoard.jsx"></script>
    <script type="text/babel" src="appgui/Screens.jsx"></script>
    <script type="text/babel" src="appgui/App.jsx"></script>
</body>
</html>
